<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>消灭病毒</title>
  <style>
    :root{
      --bg:#081024;
      --panel:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.14);
      --text:#e9edff;
      --muted:rgba(233,237,255,.72);

      --R:#ff5d73;
      --G:#57e389;
      --B:#63b3ff;

      --heartRed:#ff3b4a;
      --heartEmpty:rgba(255,255,255,.55);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1000px 620px at 30% 0%, #1a2b70 0%, var(--bg) 62%);
      color:var(--text);
      overflow:hidden;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .app{
      height:100%;
      max-width:560px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:
        calc(10px + env(safe-area-inset-top))
        10px
        calc(10px + env(safe-area-inset-bottom))
        10px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      user-select:none;
    }
    .title{
      font-weight:900;
      letter-spacing:.3px;
      font-size:16px;
      white-space:nowrap;
      opacity:.95;
    }
    .hud{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel);
      font-size:13px;
      color:var(--muted);
    }
    .chip b{color:var(--text)}
    .hearts{
      display:flex;
      gap:4px;
      align-items:center;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel);
    }
    .hearts span{
      font-size:14px;
      line-height:1;
      display:inline-block;
      transform:translateY(0.5px);
    }
    .hearts .heart-full{ color:var(--heartRed); }
    .hearts .heart-empty{ color:var(--heartEmpty); }

    .stage{
      flex:1;
      min-height:460px;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      position:relative;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:0 14px 44px rgba(0,0,0,.38);
      display:flex;
      flex-direction:column;
    }
    canvas{
      width:100%;
      flex:1;
      display:block;
      background:
        radial-gradient(900px 520px at 25% 0%, rgba(120,180,255,.18) 0%, rgba(0,0,0,0) 62%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      touch-action:none;
    }

    .bottom{
      border-top:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .caps{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:center;
      position:relative;
    }
    .cap{
      flex:1;
      height:92px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 22px rgba(0,0,0,.30);
      position:relative;
      user-select:none;
      background:rgba(255,255,255,.04);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      will-change: transform;
      transform:translateZ(0);
    }
    .cap:active{transform:scale(.98)}
    .cap small{
      position:absolute;
      left:10px; top:10px;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.32);
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,255,255,.92);
      font-weight:900;
    }

    .pillshape{
      width:66px;
      height:36px;
      border-radius:999px;
      position:relative;
      transform: rotate(-16deg);
      border:2px solid rgba(255,255,255,.84);
      box-shadow:0 10px 18px rgba(0,0,0,.22);
      overflow:hidden;
      background:#ffffff;
    }
    .pillshape::after{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(90deg, #fff 0 50%, var(--R) 50% 100%);
    }
    .cap.kR .pillshape::after{ background:linear-gradient(90deg, #fff 0 50%, var(--R) 50% 100%); }
    .cap.kG .pillshape::after{ background:linear-gradient(90deg, #fff 0 50%, var(--G) 50% 100%); }
    .cap.kB .pillshape::after{ background:linear-gradient(90deg, #fff 0 50%, var(--B) 50% 100%); }
    .pillshape::before{
      content:"";
      position:absolute;
      left:50%;
      top:-10%;
      width:2px;
      height:120%;
      background:rgba(0,0,0,.12);
      transform:translateX(-1px);
      opacity:.9;
    }

    .cap.swap{ animation: capSwap .22s ease-in-out; }
    @keyframes capSwap{
      0%   { transform: translateY(0) scale(1); }
      40%  { transform: translateY(-6px) scale(1.02); }
      70%  { transform: translateY(2px) scale(0.99); }
      100% { transform: translateY(0) scale(1); }
    }

    .controls{
      display:grid;
      grid-template-columns: 1.15fr 1fr 1fr 44px;
      gap:10px;
      align-items:stretch;
    }
    .btn{
      height:44px;
      padding:0 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.07);
      color:var(--text);
      font-size:13px;
      font-weight:900;
      user-select:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      -webkit-tap-highlight-color: transparent;
      white-space:nowrap;
    }
    .btn:active{transform:scale(.98)}
    .btn.primary{
      background:linear-gradient(180deg, rgba(120,255,180,.22), rgba(255,255,255,.05));
      border-color:rgba(120,255,180,.35);
    }
    .btn.warn{
      background:linear-gradient(180deg, rgba(255,220,120,.22), rgba(255,255,255,.05));
      border-color:rgba(255,220,120,.35);
    }
    .btn.ice{
      background:linear-gradient(180deg, rgba(120,200,255,.22), rgba(255,255,255,.05));
      border-color:rgba(120,200,255,.35);
    }
    .btn.square{
      padding:0;
      width:44px;
      min-width:44px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      font-size:16px;
    }
    .btn:disabled{opacity:.45}

    .count{
      font-weight:900;
      font-size:12px;
      opacity:.90;
      padding:2px 6px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.22);
    }
    .hint{
      font-size:12px;
      color:rgba(233,237,255,.60);
      line-height:1.35;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.58);
      z-index:50;
      padding:18px;
    }
    .overlay.show{display:flex}
    .card{
      width:min(420px, 92%);
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(10,14,30,.74);
      box-shadow:0 18px 50px rgba(0,0,0,.45);
      padding:16px 14px;
      text-align:center;
    }
    .card h2{ margin:6px 0 8px; font-size:20px; font-weight:900; letter-spacing:.2px; }
    .card p{
      margin:0 0 12px;
      font-size:13px;
      color:rgba(233,237,255,.82);
      line-height:1.55;
    }
    .card .cardbtn{
      width:100%;
      height:46px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(120,255,180,.22), rgba(255,255,255,.05));
      color:var(--text);
      font-weight:900;
      font-size:14px;
    }
    .card .cardbtn.secondary{
      margin-top:10px;
      background:rgba(255,255,255,.06);
    }
    .card .cardbtn:active{transform:scale(.99)}

    .toast{
      position:fixed;
      left:50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:rgba(0,0,0,.72);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition:.16s opacity,.16s transform;
      z-index:999;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">🧪 消灭病毒</div>
    <div class="hud">
      <div class="chip">击杀 <b id="kills">0</b></div>
      <div class="hearts" id="hearts"></div>
    </div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>

    <div class="overlay" id="overlay">
      <div class="card">
        <h2 id="ovTitle">第1关</h2>
        <p id="ovDesc">规则说明</p>
        <button class="cardbtn" id="ovBtn">开始</button>
        <button class="cardbtn secondary" id="ovBtn2" style="display:none">返回</button>
      </div>
    </div>

    <div class="bottom">
      <div class="caps" id="caps">
        <div class="cap kR" id="c1" style="order:0"><small>1</small><div class="pillshape"></div></div>
        <div class="cap kG" id="c2" style="order:1"><small>2</small><div class="pillshape"></div></div>
        <div class="cap kB" id="c3" style="order:2"><small>3</small><div class="pillshape"></div></div>
      </div>

      <div class="controls">
        <button class="btn primary" id="mainBtn">▶ 开始</button>

        <button class="btn warn" id="heal">
          ❤️ 回血 <span class="count" id="healCnt">x1</span>
        </button>

        <button class="btn ice" id="freeze">
          🧊 冷冻 <span class="count" id="freezeCnt">x1</span>
        </button>

        <button class="btn square" id="sound" aria-label="sound">🔊</button>
      </div>

      <div class="hint">
        <span id="tip">规则：看最下方病毒颜色 → 点同色胶囊消灭</span>
        <span id="lvlTip">第1关：击杀20个通关</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // 防双击放大/手势缩放
  document.addEventListener("dblclick", (e)=>e.preventDefault(), {passive:false});
  document.addEventListener("gesturestart", (e)=>e.preventDefault(), {passive:false});
  document.addEventListener("gesturechange", (e)=>e.preventDefault(), {passive:false});
  document.addEventListener("gestureend", (e)=>e.preventDefault(), {passive:false});
  let lastTouchEnd = 0;
  document.addEventListener("touchend", (e)=>{
    const t = Date.now();
    if(t - lastTouchEnd <= 320) e.preventDefault();
    lastTouchEnd = t;
  }, {passive:false});

  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d", { alpha:true });

  const $ = (id)=>document.getElementById(id);
  const toastEl = $("toast");
  const capEls = [ $("c1"), $("c2"), $("c3") ];

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 900);
  }
  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
  function now(){ return Date.now(); }
  function rnd(a,b){ return a + Math.random()*(b-a); }

  // DPR/画布适配
  let DPR = 1;
  const view = { W:0, H:0 };
  function resizeCanvas(){
    const rect = cv.getBoundingClientRect();
    view.W = rect.width;
    view.H = rect.height;
    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    cv.width = Math.floor(view.W * DPR);
    cv.height = Math.floor(view.H * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }

  // 音效
  let audioCtx = null;
  let soundOn = true;
  function beep(freq=440, dur=0.06, type="sine", vol=0.06){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + dur);
    }catch{}
  }
  function vibrate(ms=12){ try{ navigator.vibrate && navigator.vibrate(ms); }catch{} }

  const COLORS = [
    {k:"R", c:getComputedStyle(document.documentElement).getPropertyValue("--R").trim()},
    {k:"G", c:getComputedStyle(document.documentElement).getPropertyValue("--G").trim()},
    {k:"B", c:getComputedStyle(document.documentElement).getPropertyValue("--B").trim()},
  ];

  // 第3关初始速度=第1关；后面动态提速
  const LEVELS = [
    { id:1, target:20, spawnEvery:820, fall:2.2, swapPills:false,
      introTitle:"第1关",
      introDesc:"击杀 20 个病毒即可通关。<br>看最下方病毒颜色，点同色胶囊消灭。<br><br><b>整局共用 5 条命（❤️）</b>"
    },
    { id:2, target:20, spawnEvery:560, fall:3.6, swapPills:false,
      introTitle:"第2关",
      introDesc:"再击杀 20 个病毒通关（击杀累计不断档）。<br>速度更快，请更专注！"
    },
    { id:3, target:Infinity, spawnEvery:820, fall:2.2, swapPills:true,
      introTitle:"第3关（无限）",
      introDesc:"无限模式：没有通关。<br>药丸按钮会随机换位！<br><br>提示：点错/漏怪都会掉血。<br><br><b>第3关会随击杀数缓慢提速</b><br><b>每击杀10个自动回1血</b>"
    },
  ];

  // 覆盖层
  const overlay = $("overlay");
  const ovTitle = $("ovTitle");
  const ovDesc  = $("ovDesc");
  const ovBtn   = $("ovBtn");
  const ovBtn2  = $("ovBtn2");

  function showOverlay({title, descHtml, btnText, onBtn, btn2Text, onBtn2}){
    ovTitle.textContent = title;
    ovDesc.innerHTML = descHtml;
    ovBtn.textContent = btnText || "确定";

    ovBtn2.style.display = btn2Text ? "block" : "none";
    if(btn2Text) ovBtn2.textContent = btn2Text;

    overlay.classList.add("show");
    ovBtn.onclick = () => {
      overlay.classList.remove("show");
      onBtn && onBtn();
    };
    ovBtn2.onclick = () => {
      overlay.classList.remove("show");
      onBtn2 && onBtn2();
    };
  }

  // HUD：击杀 + 心心
  const killsEl = $("kills");
  const heartsEl = $("hearts");
  function renderHearts(){
    const hp = Math.max(0, Math.min(5, state.hearts));
    let html = "";
    for(let i=0;i<5;i++){
      const cls = (i < hp) ? "heart-full" : "heart-empty";
      html += `<span class="${cls}">♥</span>`;
    }
    heartsEl.innerHTML = html;
  }

  // 控制按钮
  const healBtn = $("heal");
  const freezeBtn = $("freeze");
  const healCntEl = $("healCnt");
  const freezeCntEl = $("freezeCnt");
  const mainBtn = $("mainBtn");
  const soundBtn = $("sound");

  function updateMainBtn(){
    if(!state.running && !state.gameOver){ mainBtn.textContent = "▶ 开始"; return; }
    if(state.running && !state.paused){   mainBtn.textContent = "⏸ 暂停"; return; }
    if(state.running && state.paused){    mainBtn.textContent = "▶ 继续"; return; }
  }

  function syncItemUI(){
    healCntEl.textContent = "x" + state.items.heal;
    freezeCntEl.textContent = "x" + state.items.freeze;

    healBtn.disabled = !(state.running && !state.paused && !state.gameOver && state.items.heal > 0 && state.hearts < 5);
    freezeBtn.disabled = !(state.running && !state.paused && !state.gameOver && state.items.freeze > 0 && now() >= state.freezeUntil);

    updateMainBtn();
  }

  // 胶囊：颜色与换位
  let capsuleColors = ["R","G","B"];
  let capsuleOrders = [0,1,2];

  function applyCapsulesVisual(){
    for(let i=0;i<3;i++){
      const el = capEls[i];
      el.classList.remove("kR","kG","kB");
      el.classList.add("k" + capsuleColors[i]);
      el.style.order = capsuleOrders[i];
    }
  }

  let nextSwapAt = 0;
  function scheduleNextSwap(){
    nextSwapAt = now() + Math.floor(rnd(1200, 2800));
  }

  function shufflePillPositionsAnimated(){
    if(state.swapping || state.paused) return;
    state.swapping = true;

    capEls.forEach(el=>{
      el.classList.remove("swap");
      void el.offsetWidth;
      el.classList.add("swap");
    });

    const arr = [0,1,2];
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    capsuleOrders = arr;

    setTimeout(()=>{
      applyCapsulesVisual();
      beep(740, 0.05, "triangle", 0.05);
      vibrate(10);
    }, 110);

    setTimeout(()=>{
      capEls.forEach(el=>el.classList.remove("swap"));
      state.swapping = false;
      scheduleNextSwap();
    }, 260);
  }

  // 病毒
  function spawnVirus(){
    const r = 18;
    const x = 24 + Math.random() * Math.max(1, (view.W - 48));
    const shape = Math.floor(Math.random()*4);
    const spin = rnd(-2.2,2.2);
    const colorKey = COLORS[Math.floor(Math.random()*COLORS.length)].k;

    state.viruses.push({
      x, y:-24,
      r,
      colorKey,
      shape,
      ang:rnd(0,Math.PI*2),
      spin
    });
  }

  function takeBottomVirus(){
    let idx=-1, bestY=-1;
    for(let i=0;i<state.viruses.length;i++){
      if(state.viruses[i].y > bestY){ bestY = state.viruses[i].y; idx=i; }
    }
    if(idx<0) return null;
    return { idx, v: state.viruses[idx] };
  }

  // 粒子/震屏
  const particles = [];
  let shake = 0;

  function makeParticles(x,y,color,count=14, power=1){
    for(let i=0;i<count;i++){
      particles.push({
        x,y,
        vx:rnd(-3,3)*power,
        vy:rnd(-4,2)*power,
        life:rnd(0.28,0.55),
        r:rnd(2,4),
        color
      });
    }
  }

  // 状态
  const state = {
    running:false,
    paused:false,
    gameOver:false,

    levelIndex:0,
    levelKills:0,
    totalKills:0,

    hearts:5,
    viruses:[],
    lastSpawn:0,
    lastTick:0,

    swapping:false,
    freezeUntil:0,

    items:{ heal:1, freeze:1 },

    // 第3关动态提速&回血里程碑
    level3StartKills: 0,
    level3HealedMilestone: 0
  };

  function syncHUDAndTips(){
    killsEl.textContent = state.totalKills;

    const lvl = LEVELS[state.levelIndex];
    if(lvl.id===1) $("lvlTip").textContent = "第1关：击杀20个通关";
    else if(lvl.id===2) $("lvlTip").textContent = "第2关：再击杀20个通关（更快）";
    else $("lvlTip").textContent = "第3关：先慢后快（每10击杀回1血）";

    renderHearts();
    syncItemUI();
  }

  function resetToNewRun(){
    state.running = false;
    state.paused = false;
    state.gameOver = false;

    state.levelIndex = 0;
    state.levelKills = 0;
    state.totalKills = 0;

    state.hearts = 5;
    state.viruses = [];

    state.lastSpawn = 0;
    state.lastTick = now();
    state.swapping = false;

    state.freezeUntil = 0;

    state.items.heal = 1;
    state.items.freeze = 1;

    capsuleColors = ["R","G","B"];
    capsuleOrders = [0,1,2];
    applyCapsulesVisual();
    scheduleNextSwap();

    state.level3StartKills = 0;
    state.level3HealedMilestone = 0;

    syncHUDAndTips();
  }

  function startLevel(index){
    state.levelIndex = index;
    state.levelKills = 0;
    state.viruses = [];

    state.running = true;
    state.paused = false;
    state.gameOver = false;

    state.lastSpawn = 0;
    state.lastTick = now();
    state.swapping = false;

    state.freezeUntil = 0;
    scheduleNextSwap();

    if(index === 2){
      state.level3StartKills = state.totalKills;
      state.level3HealedMilestone = 0; // ✅ 第3关回血计数从0开始
    }

    syncHUDAndTips();
  }

  function showLevelIntro(index){
    const lvl = LEVELS[index];
    showOverlay({
      title: lvl.introTitle,
      descHtml: lvl.introDesc,
      btnText: (index===0 ? "开始游戏" : "进入下一关"),
      onBtn: () => startLevel(index)
    });
  }

  function completeLevelAndGoNext(){
    if(state.levelIndex === 0){
      toast("进入下一关");
      beep(880,0.09,"triangle",0.07);
      state.running = false;
      showLevelIntro(1);
      return;
    }
    if(state.levelIndex === 1){
      toast("进入第3关");
      beep(920,0.10,"triangle",0.07);
      state.running = false;
      showLevelIntro(2);
      return;
    }
  }

  function endRun(){
    state.running = false;
    state.paused = false;
    state.gameOver = true;

    const final = state.totalKills;
    showOverlay({
      title: "游戏结束",
      descHtml: `最终成绩：<b style="color:#fff">${final}</b> 次击杀<br>（本轮击杀 ${final} 个病毒）`,
      btnText: "再来一局（从第1关开始）",
      onBtn: () => {
        resetToNewRun();
        showLevelIntro(0);
      }
    });
  }

  // ✅ 第3关：每10击杀回1血（里程碑触发，防重复）
  function level3AutoHealIfNeeded(){
    const lvl = LEVELS[state.levelIndex];
    if(lvl.id !== 3) return;

    const k3 = Math.max(0, state.totalKills - state.level3StartKills); // 第3关新增击杀
    const milestone = Math.floor(k3 / 10); // 0,1,2...

    if(milestone > state.level3HealedMilestone){
      state.level3HealedMilestone = milestone;
      if(state.hearts < 5){
        state.hearts = Math.min(5, state.hearts + 1);
        renderHearts();
        toast("奖励回血 +1");
        beep(740, 0.06, "triangle", 0.05);
        vibrate(10);
      }else{
        // 满血就不提示，避免刷屏；你也可以改成提示“已满血”
      }
    }
  }

  function gainKill(colorKey, x, y){
    state.totalKills += 1;
    state.levelKills += 1;

    killsEl.textContent = state.totalKills;
    makeParticles(x, y, COLORS.find(c=>c.k===colorKey).c, 12, 0.9);

    beep(520, 0.045, "sine", 0.05);
    vibrate(8);

    // ✅ 先检查第3关回血（击杀刚加完）
    level3AutoHealIfNeeded();

    const lvl = LEVELS[state.levelIndex];
    if(lvl.id === 1 || lvl.id === 2){
      if(state.levelKills >= lvl.target){
        completeLevelAndGoNext();
      }
    }
    syncHUDAndTips();
  }

  function loseHeart(reason){
    if(state.gameOver) return;

    state.hearts = Math.max(0, state.hearts - 1);
    renderHearts();

    shake = 10;
    beep(160, 0.10, "sawtooth", 0.06);
    vibrate(14);

    if(state.hearts === 0){
      endRun();
      return;
    }

    toast(reason || "掉血");
    syncItemUI();
  }

  function useHeal(){
    if(!state.running || state.paused || state.gameOver) return;
    if(state.items.heal <= 0) return;
    if(state.hearts >= 5) return;

    state.items.heal -= 1;
    const before = state.hearts;
    state.hearts = Math.min(5, state.hearts + 3);

    renderHearts();
    toast(`回血 +${state.hearts - before}`);
    beep(740, 0.07, "triangle", 0.06);
    vibrate(10);
    syncItemUI();
  }

  function useFreeze(){
    if(!state.running || state.paused || state.gameOver) return;
    if(state.items.freeze <= 0) return;
    if(now() < state.freezeUntil) return;

    state.items.freeze -= 1;
    state.freezeUntil = now() + 3000;

    toast("冷冻 3s");
    beep(660, 0.07, "sine", 0.06);
    vibrate(10);
    syncItemUI();
  }

  function pauseGame(){
    if(!state.running || state.gameOver) return;
    state.paused = true;
    syncItemUI();

    showOverlay({
      title:"已暂停",
      descHtml:"暂停中：病毒不会下落，也不会生成或换位。",
      btnText:"继续游戏",
      onBtn: () => {
        state.paused = false;
        syncItemUI();
        state.lastTick = now();
        state.lastSpawn = now();
      },
      btn2Text:"结束本局",
      onBtn2: () => endRun()
    });
  }

  function onMainBtn(){
    if(!state.running && !state.gameOver){
      if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
      resetToNewRun();
      toast("新的一局");
      showLevelIntro(0);
      return;
    }
    if(state.running && !state.paused){
      pauseGame();
      return;
    }
    if(state.running && state.paused){
      state.paused = false;
      syncItemUI();
      state.lastTick = now();
      state.lastSpawn = now();
    }
  }

  function onCapsulePressed(btnIndex){
    if(!state.running || state.paused || state.gameOver) return;
    if(state.swapping) return;

    const got = takeBottomVirus();
    if(!got) return;

    const { idx, v } = got;
    state.viruses.splice(idx, 1);

    const btnColor = capsuleColors[btnIndex];
    if(v.colorKey === btnColor){
      gainKill(v.colorKey, v.x, v.y);
    }else{
      makeParticles(v.x, v.y, "rgba(255,255,255,.85)", 10, 0.9);
      loseHeart("点错");
    }
  }

  function drawVirus(v, sx, sy){
    const x = v.x + sx, y = v.y + sy, r = 18;
    const color = COLORS.find(c=>c.k===v.colorKey).c;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(v.ang);

    ctx.globalAlpha = 0.18;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0,0,r*1.85,0,Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = 0.96;
    ctx.fillStyle = color;

    if(v.shape === 0){
      ctx.beginPath();
      ctx.arc(0,0,r*0.95,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2;
      for(let i=0;i<10;i++){
        const a = (Math.PI*2/10)*i;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r*0.95, Math.sin(a)*r*0.95);
        ctx.lineTo(Math.cos(a)*r*1.25, Math.sin(a)*r*1.25);
        ctx.stroke();
      }
    } else if(v.shape === 1){
      polygon(3, r*0.95); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2; ctx.stroke();
      for(let i=0;i<3;i++){
        const a = (Math.PI*2/3)*i;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r*0.9, Math.sin(a)*r*0.9);
        ctx.lineTo(Math.cos(a)*r*1.35, Math.sin(a)*r*1.35);
        ctx.stroke();
      }
    } else if(v.shape === 2){
      polygon(6, r*0.98); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2; ctx.stroke();
    } else {
      ctx.beginPath();
      for(let i=0;i<4;i++){
        const a = (Math.PI/2)*i;
        ctx.moveTo(0,0);
        ctx.ellipse(Math.cos(a)*r*0.45, Math.sin(a)*r*0.45, r*0.55, r*0.36, a, 0, Math.PI*2);
      }
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2; ctx.stroke();
    }

    ctx.globalAlpha = 0.85;
    ctx.fillStyle = "rgba(0,0,0,.35)";
    ctx.beginPath(); ctx.arc(-6, -2, 3.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6, -2, 3.3, 0, Math.PI*2); ctx.fill();

    ctx.restore();

    function polygon(n, rad){
      ctx.beginPath();
      for(let i=0;i<n;i++){
        const a = (Math.PI*2/n)*i - Math.PI/2;
        const px = Math.cos(a)*rad;
        const py = Math.sin(a)*rad;
        if(i===0) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
      }
      ctx.closePath();
    }
  }

  function draw(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,view.W,view.H);

    const sx = shake>0 ? rnd(-shake, shake) : 0;
    const sy = shake>0 ? rnd(-shake, shake) : 0;
    if(shake>0) shake *= 0.86;

    ctx.globalAlpha = 0.12;
    for(let i=0;i<60;i++){
      const x = (i*127)%view.W;
      const y = (i*83)%view.H;
      ctx.beginPath();
      ctx.arc(x+sx,y+sy,(i%3)+1,0,Math.PI*2);
      ctx.fillStyle="#fff";
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if(now() < state.freezeUntil){
      ctx.fillStyle = "rgba(120,200,255,.10)";
      ctx.fillRect(0,0,view.W,view.H);
      ctx.font = "900 18px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillText("🧊", view.W-26, 26);
    }

    for(const v of state.viruses){
      drawVirus(v, sx, sy);
    }

    for(const p of particles){
      ctx.globalAlpha = clamp(p.life,0,1);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x+sx, p.y+sy, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function tick(){
    const t = now();
    const dt = Math.min(0.04, (t - state.lastTick)/1000);
    state.lastTick = t;

    if(state.running && !state.paused && !state.gameOver){
      const lvl = LEVELS[state.levelIndex];
      const frozen = (t < state.freezeUntil);

      // 第3关动态提速：先慢后快（随击杀）
      let fallMul = 1;
      let spawnMul = 1;
      if(lvl.id === 3){
        const k3 = Math.max(0, state.totalKills - state.level3StartKills);
        fallMul = Math.min(1.7, 1 + Math.floor(k3 / 10) * 0.08);
        spawnMul = Math.min(1.35, 1 + Math.floor(k3 / 15) * 0.05);
      }

      if(!frozen){
        if(t - state.lastSpawn > (lvl.spawnEvery / spawnMul)){
          state.lastSpawn = t;
          spawnVirus();
        }

        for(const v of state.viruses){
          v.y += (lvl.fall * fallMul) * (60*dt);
          v.ang += (v.spin || 0) * dt;
        }
      }

      for(let i=state.viruses.length-1;i>=0;i--){
        if(state.viruses[i].y > view.H - 18){
          const v = state.viruses[i];
          state.viruses.splice(i,1);
          makeParticles(v.x, v.y, "rgba(255,255,255,.85)", 10, 0.9);
          loseHeart("漏怪");
        }
      }

      if(lvl.swapPills && !frozen && t >= nextSwapAt){
        shufflePillPositionsAnimated();
      }
    }

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= 0.02;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.98;
      if(p.life <= 0) particles.splice(i,1);
    }

    draw();
    requestAnimationFrame(tick);
  }

  // 输入
  function prevent(e){ e.preventDefault(); }

  capEls.forEach((el, idx)=>{
    el.addEventListener("pointerdown", (e)=>{ prevent(e); onCapsulePressed(idx); }, {passive:false});
  });

  cv.addEventListener("pointerdown", (e)=>{
    prevent(e);
    if(!state.running || state.paused || state.gameOver) return;
    if(state.swapping) return;

    const got = takeBottomVirus();
    if(!got) return;
    const v = got.v;

    const idx = capsuleColors.indexOf(v.colorKey);
    if(idx >= 0) onCapsulePressed(idx);
  }, {passive:false});

  mainBtn.addEventListener("pointerdown", (e)=>{ prevent(e); onMainBtn(); }, {passive:false});
  healBtn.addEventListener("pointerdown", (e)=>{ prevent(e); useHeal(); }, {passive:false});
  freezeBtn.addEventListener("pointerdown", (e)=>{ prevent(e); useFreeze(); }, {passive:false});

  soundBtn.addEventListener("pointerdown", (e)=>{
    prevent(e);
    soundOn = !soundOn;
    toast(soundOn ? "🔊" : "🔇");
    if(soundOn) beep(660,0.05,"sine",0.05);
    soundBtn.textContent = soundOn ? "🔊" : "🔇";
  }, {passive:false});

  function init(){
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas, {passive:true});

    resetToNewRun();
    showLevelIntro(0);
    updateMainBtn();
    tick();
  }
  init();
})();
</script>
</body>
