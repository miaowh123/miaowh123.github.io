<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>消灭病毒（移动端）</title>
  <style>
    :root{
      --bg:#081024; --panel:rgba(255,255,255,.06); --line:rgba(255,255,255,.12);
      --text:#e9edff; --muted:rgba(233,237,255,.72);

      --c1:#ff5d73; /* 红 */
      --c2:#57e389; /* 绿 */
      --c3:#63b3ff; /* 蓝 */
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:radial-gradient(1000px 620px at 30% 0%, #1a2b70 0%, var(--bg) 62%);
      color:var(--text);
      overflow:hidden;
      touch-action:none;
    }

    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:
        calc(10px + env(safe-area-inset-top))
        10px
        calc(10px + env(safe-area-inset-bottom))
        10px;
      gap:10px;
      max-width:520px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .title{
      font-weight:900;
      letter-spacing:.2px;
      font-size:16px;
      line-height:1;
      white-space:nowrap;
    }
    .hud{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      padding:6px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel);
      font-size:12px;
      color:var(--muted);
    }
    .pill b{color:var(--text)}

    .stage{
      flex:1;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:16px;
      box-shadow:0 14px 40px rgba(0,0,0,.38);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:420px;
    }

    canvas{
      width:100%;
      flex:1;
      display:block;
      background:
        radial-gradient(800px 420px at 20% 0%, rgba(120,180,255,.18) 0%, rgba(0,0,0,0) 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .bottom{
      border-top:1px solid rgba(255,255,255,.10);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
    }

    /* 胶囊区 */
    .caps{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      align-items:center;
      position:relative;
    }

    .cap{
      height:86px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 22px rgba(0,0,0,.30);
      position:relative;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transform:translateZ(0);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      will-change: transform;
    }
    .cap:active{transform:scale(.98)}
    .cap small{
      position:absolute;
      left:10px; top:10px;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.30);
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,255,255,.92);
      font-weight:800;
    }

    .pillshape{
      width:62px; height:34px;
      border-radius:999px;
      position:relative;
      border:1px solid rgba(255,255,255,.25);
      box-shadow:0 10px 18px rgba(0,0,0,.22);
      overflow:hidden;
    }
    .pillshape::before{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(90deg, rgba(255,255,255,.38), rgba(255,255,255,.08));
      clip-path: polygon(0 0, 52% 0, 48% 100%, 0 100%);
      opacity:.55;
    }

    /* 胶囊颜色（动态 class：kR/kG/kB） */
    .cap.kR .pillshape{ background:linear-gradient(90deg, rgba(0,0,0,.15), rgba(255,255,255,.08)), var(--c1); }
    .cap.kG .pillshape{ background:linear-gradient(90deg, rgba(0,0,0,.15), rgba(255,255,255,.08)), var(--c2); }
    .cap.kB .pillshape{ background:linear-gradient(90deg, rgba(0,0,0,.15), rgba(255,255,255,.08)), var(--c3); }

    /* 交换动画：轻量“抖动” */
    .cap.swap{ animation: capSwap .22s ease-in-out; }
    @keyframes capSwap{
      0%   { transform: translateY(0) scale(1); }
      30%  { transform: translateY(-6px) scale(1.02); }
      60%  { transform: translateY(2px) scale(0.99); }
      100% { transform: translateY(0) scale(1); }
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btn{
      height:44px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.07);
      color:var(--text);
      font-size:13px;
      font-weight:800;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:104px;
    }
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45}
    .btn.primary{background:linear-gradient(180deg, rgba(120,255,180,.22), rgba(255,255,255,.05)); border-color:rgba(120,255,180,.35)}
    .btn.warn{background:linear-gradient(180deg, rgba(255,220,120,.22), rgba(255,255,255,.05)); border-color:rgba(255,220,120,.35)}
    .btn.ghost{min-width:84px}

    .hint{
      font-size:12px;
      color:rgba(233,237,255,.60);
      line-height:1.35;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .toast{
      position:fixed;left:50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:rgba(0,0,0,.72);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition:.16s opacity,.16s transform;
      z-index:999;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">🧪 消灭病毒</div>
    <div class="hud">
      <span class="pill">关 <b id="lvl">1</b></span>
      <span class="pill">时 <b id="time">20</b>s</span>
      <span class="pill">分 <b id="score">0</b></span>
      <span class="pill">连 <b id="combo">0</b></span>
      <span class="pill">倍 <b id="mult">x1.0</b></span>
      <span class="pill">失 <b id="miss">0</b>/3</span>
      <span class="pill">🧊 <b id="fz">1</b></span>
    </div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>

    <div class="bottom">
      <div class="caps">
        <div class="cap" id="c1"><small>1</small><div class="pillshape"></div></div>
        <div class="cap" id="c2"><small>2</small><div class="pillshape"></div></div>
        <div class="cap" id="c3"><small>3</small><div class="pillshape"></div></div>
      </div>

      <div class="controls">
        <button class="btn primary" id="start">▶ 开始</button>
        <button class="btn warn" id="next">⏭ 下一关</button>
        <button class="btn" id="freeze">🧊 冷冻</button>
        <button class="btn" id="ad">🎁 领冷冻</button>
        <button class="btn ghost" id="sound">🔊</button>
      </div>

      <div class="hint">
        <span>规则：看病毒颜色 → 点同色胶囊</span>
        <span id="tip">点开始开玩</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d", { alpha: true });

  const $ = (id)=>document.getElementById(id);
  const toastEl = $("toast");

  const capEls = [ $("c1"), $("c2"), $("c3") ];

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 900);
  }
  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
  function now(){ return Date.now(); }
  function rnd(a,b){ return a + Math.random()*(b-a); }

  // ===== DPR/尺寸：统一用 CSS 像素坐标绘制 =====
  let DPR = 1;
  const view = { W: 0, H: 0 };

  function resizeCanvas(){
    const rect = cv.getBoundingClientRect();
    view.W = rect.width;
    view.H = rect.height;

    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    cv.width  = Math.floor(view.W * DPR);
    cv.height = Math.floor(view.H * DPR);

    // 关键：保持 CSS 像素坐标系绘制
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  // ===== 音效（可关）=====
  let audioCtx = null;
  let soundOn = true;
  function beep(freq=440, dur=0.06, type="sine", vol=0.06){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + dur);
    }catch{}
  }
  function vibrate(ms=14){
    try{ if(navigator.vibrate) navigator.vibrate(ms); }catch{}
  }

  // ===== 颜色与关卡 =====
  const COLORS = [
    {k:"R", c:"#ff5d73"},
    {k:"G", c:"#57e389"},
    {k:"B", c:"#63b3ff"},
  ];
  const LEVELS = [
    // 第一关：轻松练手（不换位）
    {id:1, duration:20, spawnEvery:760, fall:2.1, swapChance:0.00, specialRate:0.12, bombRate:0.03},
    // 第二关：加速+换位（视觉也换）
    {id:2, duration:20, spawnEvery:520, fall:3.4, swapChance:0.22, specialRate:0.18, bombRate:0.06},
  ];

  // ===== 粒子/震屏 =====
  const particles = [];
  let shake = 0;

  function makeParticles(x,y,color,count=14, power=1){
    for(let i=0;i<count;i++){
      particles.push({
        x,y,
        vx:rnd(-3,3)*power,
        vy:rnd(-4,2)*power,
        life:rnd(0.28,0.55),
        r:rnd(2,4),
        color
      });
    }
  }

  // ===== 游戏状态 =====
  // capsuleOrder：索引0..2分别对应 c1,c2,c3 当前“显示的颜色”
  let capsuleOrder = ["R","G","B"];

  const state = {
    lvlIndex:0,
    running:false,
    over:true,
    endType:"idle", // "win" | "lose" | "idle"
    timeLeft:20,
    score:0,
    combo:0,
    mult:1.0,
    miss:0,
    viruses:[],  // {x,y,r,colorKey,vy,kind,shape,spin,ang}
    lastSpawn:0,
    lastTick:0,
    freezeUntil:0,
    freezeCharges:1,
    adCdUntil:0,
    swapTelegraphUntil:0,
    swapping:false,
  };

  function computeMult(){
    const c = state.combo;
    const m = 1 + clamp(c/12, 0, 1.6);
    state.mult = Math.round(m*10)/10;
  }

  function syncHUD(){
    const lvl = LEVELS[state.lvlIndex];
    $("lvl").textContent = lvl.id;
    $("time").textContent = Math.max(0, Math.ceil(state.timeLeft));
    $("score").textContent = state.score;
    $("combo").textContent = state.combo;
    $("mult").textContent = "x" + state.mult.toFixed(1);
    $("miss").textContent = state.miss;
    $("fz").textContent = state.freezeCharges;

    $("next").disabled = !(state.over && state.endType==="win" && lvl.id===1);
    $("freeze").disabled = state.freezeCharges<=0 || !state.running || state.over;

    const left = Math.max(0, Math.ceil((state.adCdUntil - now())/1000));
    $("ad").disabled = left>0 || !state.running || state.over;
    $("ad").textContent = left>0 ? `🎁 ${left}s` : "🎁 领冷冻";

    $("sound").textContent = soundOn ? "🔊" : "🔇";

    if(lvl.id===1) $("tip").textContent = "第1关：轻松练手";
    else $("tip").textContent = "第2关：加速+换位";
  }

  function renderCapsules(){
    capEls.forEach((el, i) => {
      el.classList.remove("kR","kG","kB");
      el.classList.add("k" + capsuleOrder[i]);
    });
  }

  function shuffleCapsulesAnimated(){
    if(state.swapping) return;
    state.swapping = true;

    state.swapTelegraphUntil = now() + 160;
    toast("⚡ 换位");

    capEls.forEach(el => {
      el.classList.remove("swap");
      void el.offsetWidth; // 强制重排，确保重复触发
      el.classList.add("swap");
    });

    const a = [...capsuleOrder];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }

    setTimeout(()=>{
      capsuleOrder = a;
      renderCapsules();
      beep(740, 0.06, "triangle", 0.06);
      vibrate(10);
    }, 110);

    setTimeout(()=>{
      capEls.forEach(el => el.classList.remove("swap"));
      state.swapping = false;
    }, 260);
  }

  function resetGame(){
    const lvl = LEVELS[state.lvlIndex];
    state.running = true;
    state.over = false;
    state.endType = "idle";

    state.timeLeft = lvl.duration;
    state.score = 0;
    state.combo = 0;
    state.mult = 1.0;
    state.miss = 0;

    state.viruses = [];
    particles.length = 0;

    state.lastSpawn = 0;
    state.lastTick = now();

    state.freezeUntil = 0;
    state.swapTelegraphUntil = 0;
    state.swapping = false;

    capsuleOrder = ["R","G","B"];
    renderCapsules();

    if(lvl.id === 1) state.freezeCharges = Math.max(1, state.freezeCharges);

    syncHUD();
  }

  // ===== 病毒生成 =====
  function spawnVirus(){
    const lvl = LEVELS[state.lvlIndex];
    const r = 18;
    const x = 24 + Math.random() * Math.max(1, (view.W - 48));
    const shape = Math.floor(Math.random()*4);
    const spin = rnd(-2.2, 2.2);

    let kind = "n";
    const roll = Math.random();
    if(roll < lvl.bombRate) kind = "b";                     // 🧼消毒
    else if(roll < lvl.bombRate + lvl.specialRate) kind = "g"; // 🛡️抗体

    let colorKey = COLORS[Math.floor(Math.random()*COLORS.length)].k;
    if(kind !== "n") colorKey = "X";

    state.viruses.push({
      x, y:-22, r,
      colorKey, vy:lvl.fall,
      kind, shape,
      ang:rnd(0,Math.PI*2),
      spin
    });
  }

  function takeBottomVirus(){
    let idx=-1, bestY=-1;
    for(let i=0;i<state.viruses.length;i++){
      if(state.viruses[i].y > bestY){ bestY = state.viruses[i].y; idx=i; }
    }
    if(idx<0) return null;
    return { idx, v: state.viruses[idx] };
  }

  function correct(){
    state.combo += 1;
    computeMult();
    const add = Math.floor((18 + Math.min(34, state.combo*2)) * state.mult);
    state.score += add;
    beep(520 + state.combo*10, 0.045, "sine", 0.05);
    if(state.combo % 10 === 0){ toast("🔥 连击"); vibrate(10); }
  }

  function wrong(){
    state.combo = 0;
    computeMult();
    state.miss += 1;
    shake = 10;
    toast("❌");
    beep(160, 0.10, "sawtooth", 0.06);
    vibrate(14);
    if(state.miss >= 3){
      toast("失败");
      endGame("lose");
    }
  }

  function disinfectBomb(x,y){
    const n = state.viruses.length;
    state.viruses = [];
    state.score += Math.min(180, 20*n);
    makeParticles(x,y,"rgba(255,255,255,.95)",30,1.2);
    shake = 14;
    toast("🧼 消毒！");
    beep(120,0.16,"sawtooth",0.08);
    vibrate(18);
  }

  function hitCapsule(capsuleIndex){
    if(!state.running || state.over) return;
    if(state.swapping) return;

    const got = takeBottomVirus();
    if(!got) return;

    const { idx, v } = got;
    state.viruses.splice(idx,1);

    const capColor = capsuleOrder[capsuleIndex];

    // 抗体奖励：任意胶囊都可
    if(v.kind === "g"){
      state.combo += 2;
      computeMult();
      state.score += Math.floor(140 * state.mult);
      makeParticles(v.x, v.y, "rgba(255,220,120,.95)", 26, 1.1);
      toast("🛡️ 抗体+");
      beep(980,0.07,"triangle",0.07);
      vibrate(10);
      syncHUD();
      return;
    }

    // 消毒：任意胶囊触发清屏
    if(v.kind === "b"){
      disinfectBomb(v.x, v.y);
      syncHUD();
      return;
    }

    if(v.colorKey === capColor){
      const col = COLORS.find(c=>c.k===v.colorKey).c;
      makeParticles(v.x, v.y, col, 12, 0.9);
      correct();
    }else{
      wrong();
    }
    syncHUD();
  }

  function useFreeze(){
    if(state.freezeCharges<=0 || state.over) return;
    state.freezeCharges -= 1;
    state.freezeUntil = now() + 2400;
    toast("🧊 冷冻");
    beep(520,0.07,"sine",0.07);
    vibrate(10);
    syncHUD();
  }

  function claimFreeze(){
    if(state.adCdUntil - now() > 0) return;
    $("ad").disabled = true;
    toast("🎁");
    setTimeout(()=>{
      state.freezeCharges += 1;
      const cd = (LEVELS[state.lvlIndex].id===1 ? 10 : 18);
      state.adCdUntil = now() + cd*1000;
      toast("🧊+1");
      beep(660,0.07,"triangle",0.07);
      syncHUD();
    }, 650);
  }

  function endGame(type){
    state.endType = type || "idle";
    state.over = true;
    state.running = false;
    syncHUD();
  }

  // ===== 绘制：病毒（不同形状）=====
  function drawVirus(v, frozen, sx, sy){
    const x = v.x + sx, y = v.y + sy, r = v.r;

    let color = "#fff";
    if(v.kind==="n") color = COLORS.find(c=>c.k===v.colorKey).c;
    if(v.kind==="g") color = "#ffd166";
    if(v.kind==="b") color = "#d0d7ff";

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(v.ang);

    // 外发光
    ctx.globalAlpha = frozen ? 0.16 : 0.18;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0,0,r*1.8,0,Math.PI*2);
    ctx.fill();

    // 主体
    ctx.globalAlpha = frozen ? 0.80 : 0.96;
    ctx.fillStyle = color;

    if(v.shape === 0){
      // 圆 + 刺
      ctx.beginPath();
      ctx.arc(0,0,r*0.95,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2;
      for(let i=0;i<10;i++){
        const a = (Math.PI*2/10)*i;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r*0.95, Math.sin(a)*r*0.95);
        ctx.lineTo(Math.cos(a)*r*1.25, Math.sin(a)*r*1.25);
        ctx.stroke();
      }
    } else if(v.shape === 1){
      // 三角刺
      polygon(3, r*0.95); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2; ctx.stroke();
      for(let i=0;i<3;i++){
        const a = (Math.PI*2/3)*i;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*r*0.9, Math.sin(a)*r*0.9);
        ctx.lineTo(Math.cos(a)*r*1.35, Math.sin(a)*r*1.35);
        ctx.stroke();
      }
    } else if(v.shape === 2){
      // 六边形
      polygon(6, r*0.98); ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2; ctx.stroke();
    } else {
      // 四叶花
      ctx.beginPath();
      for(let i=0;i<4;i++){
        const a = (Math.PI/2)*i;
        ctx.moveTo(0,0);
        ctx.ellipse(Math.cos(a)*r*0.45, Math.sin(a)*r*0.45, r*0.55, r*0.36, a, 0, Math.PI*2);
      }
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 2; ctx.stroke();
    }

    // 眼睛：更“上头”
    if(v.kind === "n"){
      ctx.globalAlpha = frozen ? 0.65 : 0.8;
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.beginPath(); ctx.arc(-6, -2, 3.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( 6, -2, 3.3, 0, Math.PI*2); ctx.fill();
    }

    // 特殊图标
    ctx.globalAlpha = 1;
    ctx.font = "900 14px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if(v.kind==="g") ctx.fillText("🛡️", 0, 1);
    if(v.kind==="b") ctx.fillText("🧼", 0, 1);

    ctx.restore();

    function polygon(n, rad){
      ctx.beginPath();
      for(let i=0;i<n;i++){
        const a = (Math.PI*2/n)*i - Math.PI/2;
        const px = Math.cos(a)*rad;
        const py = Math.sin(a)*rad;
        if(i===0) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
      }
      ctx.closePath();
    }
  }

  function draw(){
    // DPR坐标系（CSS像素）
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,view.W,view.H);

    // 震动
    const sx = shake>0 ? rnd(-shake, shake) : 0;
    const sy = shake>0 ? rnd(-shake, shake) : 0;
    if(shake>0) shake *= 0.86;

    // 背景星尘
    ctx.globalAlpha = 0.12;
    for(let i=0;i<60;i++){
      const x = (i*127)%view.W;
      const y = (i*83)%view.H;
      ctx.beginPath();
      ctx.arc(x+sx,y+sy,(i%3)+1,0,Math.PI*2);
      ctx.fillStyle="#fff";
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 换位预警闪烁
    if(now() < state.swapTelegraphUntil){
      ctx.globalAlpha = 0.14;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,view.W,view.H);
      ctx.globalAlpha = 1;
      ctx.font = "900 20px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.9)";
      ctx.fillText("⚡", view.W-26, 26);
    }

    const frozen = now() < state.freezeUntil;

    // 病毒
    for(const v of state.viruses){
      drawVirus(v, frozen, sx, sy);
    }

    // 粒子
    for(const p of particles){
      ctx.globalAlpha = clamp(p.life,0,1);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x+sx, p.y+sy, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // 冷冻遮罩
    if(frozen){
      ctx.fillStyle = "rgba(120,200,255,.10)";
      ctx.fillRect(0,0,view.W,view.H);
      ctx.font = "900 18px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillText("🧊", view.W-26, 26);
    }

    // 结算遮罩：第一关通关显示“进入下一关”
    if(state.over){
      const lvl = LEVELS[state.lvlIndex];
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(0,0,view.W,view.H);

      let big = "结束";
      let small = "点开始继续";

      if(state.endType === "win"){
        if(lvl.id === 1){
          big = "进入下一关";
          small = "点“下一关”继续";
        }else{
          big = "通关";
          small = "点开始重玩";
        }
      }else if(state.endType === "lose"){
        big = "失败";
        small = "点开始重来";
      }

      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.font = "900 34px system-ui";
      ctx.fillText(big, view.W/2 - ctx.measureText(big).width/2, view.H/2 - 8);

      ctx.font = "800 14px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.80)";
      ctx.fillText(small, view.W/2 - ctx.measureText(small).width/2, view.H/2 + 20);
    }
  }

  function tick(){
    const t = now();
    let slow = 1;
    if(state.running && !state.over && state.miss>=2 && state.viruses.length>=6) slow = 0.58;

    const dt = Math.min(0.04, ((t - state.lastTick)/1000) * slow);
    state.lastTick = t;

    if(state.running && !state.over){
      state.timeLeft -= dt;
      const lvl = LEVELS[state.lvlIndex];

      // 生成
      if(t - state.lastSpawn > lvl.spawnEvery){
        state.lastSpawn = t;
        spawnVirus();
      }

      // 关2：视觉换位（颜色也交换 + 动画）
      if(lvl.swapChance>0 && Math.random() < lvl.swapChance*dt){
        shuffleCapsulesAnimated();
      }

      const frozen = t < state.freezeUntil;
      if(!frozen){
        for(const v of state.viruses){
          v.y += v.vy * (60*dt);
          v.ang += v.spin * dt;
        }
      }

      // 掉到底：漏掉算失误
      for(let i=state.viruses.length-1;i>=0;i--){
        if(state.viruses[i].y > view.H - 20){
          state.viruses.splice(i,1);
          state.combo = 0; computeMult();
          state.miss += 1;
          shake = 8;
          beep(160,0.09,"sawtooth",0.05);
          vibrate(12);
          if(state.miss>=3){
            toast("失败");
            endGame("lose");
          }else{
            toast("漏");
          }
        }
      }

      // 时间到：通关
      if(state.timeLeft <= 0){
        state.timeLeft = 0;
        toast(lvl.id===1 ? "进入下一关" : "通关");
        beep(880,0.12,"triangle",0.08);
        endGame("win");
      }

      syncHUD();
    }

    // 粒子更新
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= 0.02;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.98;
      if(p.life <= 0) particles.splice(i,1);
    }

    draw();
    requestAnimationFrame(tick);
  }

  // ===== 交互 =====
  function prevent(e){ e.preventDefault(); }

  capEls[0].addEventListener("pointerdown", (e)=>{ prevent(e); hitCapsule(0); }, {passive:false});
  capEls[1].addEventListener("pointerdown", (e)=>{ prevent(e); hitCapsule(1); }, {passive:false});
  capEls[2].addEventListener("pointerdown", (e)=>{ prevent(e); hitCapsule(2); }, {passive:false});

  // 点画布：自动选择底部病毒颜色对应的胶囊（更手机友好）
  cv.addEventListener("pointerdown", (e)=>{
    prevent(e);
    if(!state.running || state.over) return;
    if(state.swapping) return;
    const got = takeBottomVirus();
    if(!got) return;
    const v = got.v;
    if(v.kind !== "n"){ hitCapsule(1); return; }
    const idx = capsuleOrder.indexOf(v.colorKey);
    if(idx >= 0) hitCapsule(idx);
  }, {passive:false});

  $("start").addEventListener("pointerdown", (e)=>{
    prevent(e);
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    if(!view.W || !view.H) resizeCanvas();
    resetGame();
    toast("开始");
    beep(520,0.07,"triangle",0.06);
  }, {passive:false});

  $("next").addEventListener("pointerdown", (e)=>{
    prevent(e);
    const lvl = LEVELS[state.lvlIndex];
    if(lvl.id === 1 && state.over && state.endType==="win"){
      state.lvlIndex = 1;
      resetGame();
      toast("第2关");
      beep(740,0.09,"triangle",0.07);
    }
  }, {passive:false});

  $("freeze").addEventListener("pointerdown", (e)=>{ prevent(e); useFreeze(); }, {passive:false});
  $("ad").addEventListener("pointerdown", (e)=>{ prevent(e); claimFreeze(); }, {passive:false});

  $("sound").addEventListener("pointerdown", (e)=>{
    prevent(e);
    soundOn = !soundOn;
    toast(soundOn ? "🔊" : "🔇");
    if(soundOn) beep(660,0.06,"sine",0.06);
    syncHUD();
  }, {passive:false});

  // ===== 初始化 =====
  function init(){
    resizeCanvas();
    window.addEventListener("resize", () => { resizeCanvas(); }, {passive:true});

    capsuleOrder = ["R","G","B"];
    renderCapsules();

    state.running = false;
    state.over = true;
    state.endType = "idle";
    state.freezeCharges = 1;
    state.lvlIndex = 0;
    state.timeLeft = LEVELS[0].duration;

    syncHUD();
    tick();
  }

  init();
})();
</script>
</body>
</html>
