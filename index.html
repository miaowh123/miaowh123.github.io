<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>星星分拣员（移动端·修复版）</title>
  <style>
    :root{
      --bg:#0b1020; --panel:rgba(255,255,255,.06); --line:rgba(255,255,255,.12);
      --text:#e9edff; --muted:rgba(233,237,255,.72);
      --r:#ff5d73; --g:#57e389; --b:#63b3ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:radial-gradient(1000px 620px at 30% 0%, #1a2b70 0%, var(--bg) 62%);
      color:var(--text);
      overflow:hidden;
      touch-action:none;
    }

    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:
        calc(10px + env(safe-area-inset-top))
        10px
        calc(10px + env(safe-area-inset-bottom))
        10px;
      gap:10px;
      max-width:520px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .title{
      font-weight:900;
      letter-spacing:.2px;
      font-size:16px;
      line-height:1;
      white-space:nowrap;
    }
    .hud{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      padding:6px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel);
      font-size:12px;
      color:var(--muted);
    }
    .pill b{color:var(--text)}

    .stage{
      flex:1;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:16px;
      box-shadow:0 14px 40px rgba(0,0,0,.38);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:420px;
    }

    canvas{
      width:100%;
      flex:1;
      display:block;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .bottom{
      border-top:1px solid rgba(255,255,255,.10);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
    }

    .doors{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }
    .door{
      height:86px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 22px rgba(0,0,0,.30);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      letter-spacing:.3px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transform:translateZ(0);
    }
    .door:active{transform:scale(.98)}
    .door small{
      position:absolute;
      left:10px; top:10px;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.30);
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,255,255,.92);
      font-weight:800;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btn{
      height:44px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.07);
      color:var(--text);
      font-size:13px;
      font-weight:800;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:104px;
    }
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45}
    .btn.primary{background:linear-gradient(180deg, rgba(120,255,180,.22), rgba(255,255,255,.05)); border-color:rgba(120,255,180,.35)}
    .btn.warn{background:linear-gradient(180deg, rgba(255,220,120,.22), rgba(255,255,255,.05)); border-color:rgba(255,220,120,.35)}
    .btn.ghost{min-width:84px}

    .hint{
      font-size:12px;
      color:rgba(233,237,255,.60);
      line-height:1.35;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .toast{
      position:fixed;left:50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:rgba(0,0,0,.72);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition:.16s opacity,.16s transform;
      z-index:999;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">⭐ 星星分拣员</div>
    <div class="hud">
      <span class="pill">关 <b id="lvl">1</b></span>
      <span class="pill">时 <b id="time">20</b>s</span>
      <span class="pill">分 <b id="score">0</b></span>
      <span class="pill">连 <b id="combo">0</b></span>
      <span class="pill">倍 <b id="mult">x1.0</b></span>
      <span class="pill">失 <b id="miss">0</b>/3</span>
      <span class="pill">🧊 <b id="fz">1</b></span>
    </div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>

    <div class="bottom">
      <div class="doors">
        <div class="door" id="d1"><small>1</small></div>
        <div class="door" id="d2"><small>2</small></div>
        <div class="door" id="d3"><small>3</small></div>
      </div>

      <div class="controls">
        <button class="btn primary" id="start">▶ 开始</button>
        <button class="btn warn" id="next">⏭ 下一关</button>
        <button class="btn" id="freeze">🧊 冷冻</button>
        <button class="btn" id="ad">🎁 领冷冻</button>
        <button class="btn ghost" id="sound">🔊</button>
      </div>

      <div class="hint">
        <span>规则：看颜色 → 点同色门</span>
        <span id="tip">点开始开玩</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d", { alpha: true });

  const $ = (id)=>document.getElementById(id);
  const toastEl = $("toast");

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 950);
  }
  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
  function now(){ return Date.now(); }
  function rnd(a,b){ return a + Math.random()*(b-a); }

  // ===== DPR/尺寸：统一用 CSS 像素坐标绘制 =====
  let DPR = 1;
  const view = { W: 0, H: 0 }; // CSS像素尺寸（绘制坐标）

  function resizeCanvas(){
    const rect = cv.getBoundingClientRect();
    view.W = rect.width;
    view.H = rect.height;

    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    cv.width  = Math.floor(view.W * DPR);
    cv.height = Math.floor(view.H * DPR);

    // 关键：始终以 CSS 像素为坐标系绘制（避免挤在左上角）
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  // ===== 音效（可关）=====
  let audioCtx = null;
  let soundOn = true;
  function beep(freq=440, dur=0.06, type="sine", vol=0.06){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + dur);
    }catch{}
  }

  function vibrate(ms=14){
    try{ if(navigator.vibrate) navigator.vibrate(ms); }catch{}
  }

  // ===== 配色/关卡 =====
  const COLORS = [
    {k:"R", c:"#ff5d73"},
    {k:"G", c:"#57e389"},
    {k:"B", c:"#63b3ff"},
  ];
  const LEVELS = [
    {id:1, duration:20, spawnEvery:780, fall:2.1, swapChance:0.00, specialRate:0.12, bombRate:0.03},
    {id:2, duration:20, spawnEvery:520, fall:3.4, swapChance:0.22, specialRate:0.18, bombRate:0.06},
  ];

  // ===== 粒子/震屏 =====
  const particles = [];
  let shake = 0;

  function makeParticles(x,y,color,count=14, power=1){
    for(let i=0;i<count;i++){
      particles.push({
        x,y,
        vx:rnd(-3,3)*power,
        vy:rnd(-4,2)*power,
        life:rnd(0.28,0.55),
        r:rnd(2,4),
        color
      });
    }
  }

  // ===== 游戏状态 =====
  let doorOrder = ["R","G","B"]; // d1,d2,d3 当前对应颜色（关2可能打乱）

  const state = {
    lvlIndex:0,
    running:false,
    over:true, // 初始等用户点开始
    timeLeft:20,
    score:0,
    combo:0,
    mult:1.0,
    miss:0,
    stars:[],     // {x,y,r,colorKey,vy,kind:"n"|"g"|"b"}
    lastSpawn:0,
    lastTick:0,
    freezeUntil:0,
    freezeCharges:1,
    adCdUntil:0,
    swapTelegraphUntil:0,
  };

  function computeMult(){
    const c = state.combo;
    const m = 1 + clamp(c/12, 0, 1.6);
    state.mult = Math.round(m*10)/10;
  }

  function syncHUD(){
    const lvl = LEVELS[state.lvlIndex];
    $("lvl").textContent = lvl.id;
    $("time").textContent = Math.max(0, Math.ceil(state.timeLeft));
    $("score").textContent = state.score;
    $("combo").textContent = state.combo;
    $("mult").textContent = "x" + state.mult.toFixed(1);
    $("miss").textContent = state.miss;
    $("fz").textContent = state.freezeCharges;

    $("next").disabled = !(state.over && lvl.id===1);
    $("freeze").disabled = state.freezeCharges<=0 || !state.running || state.over;

    const left = Math.max(0, Math.ceil((state.adCdUntil - now())/1000));
    $("ad").disabled = left>0 || !state.running || state.over;
    $("ad").textContent = left>0 ? `🎁 ${left}s` : "🎁 领冷冻";

    $("sound").textContent = soundOn ? "🔊" : "🔇";
    $("tip").textContent = (lvl.id===1) ? "第1关：轻松练手" : "第2关：加速+换位";
  }

  function renderDoorColors(){
    const map = {R:"#ff5d73", G:"#57e389", B:"#63b3ff"};
    $("d1").style.background = map[doorOrder[0]];
    $("d2").style.background = map[doorOrder[1]];
    $("d3").style.background = map[doorOrder[2]];
  }

  function shuffleDoorOrder(){
    const a = [...doorOrder];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    doorOrder = a;
    renderDoorColors();
  }

  function resetGame(){
    const lvl = LEVELS[state.lvlIndex];
    state.running = true;
    state.over = false;
    state.timeLeft = lvl.duration;

    state.score = 0;
    state.combo = 0;
    state.mult = 1.0;
    state.miss = 0;

    state.stars = [];
    particles.length = 0;

    state.lastSpawn = 0;
    state.lastTick = now();

    state.freezeUntil = 0;
    state.swapTelegraphUntil = 0;

    doorOrder = ["R","G","B"];
    renderDoorColors();

    // 第1关送一次冷冻
    if(lvl.id === 1) state.freezeCharges = Math.max(1, state.freezeCharges);

    syncHUD();
  }

  // ===== 生成星星：严格使用 view.W/view.H（覆盖整个画面）=====
  function spawnStar(){
    const lvl = LEVELS[state.lvlIndex];
    const r = 18;

    // 横向占满：从 24 到 W-24
    let x = 24 + Math.random() * Math.max(1, (view.W - 48));

    // 特殊星：金⭐/💣
    let kind = "n";
    const roll = Math.random();
    if(roll < lvl.bombRate) kind = "b";
    else if(roll < lvl.bombRate + lvl.specialRate) kind = "g";

    let colorKey = COLORS[Math.floor(Math.random()*COLORS.length)].k;
    if(kind !== "n") colorKey = "X";

    state.stars.push({ x, y: -22, r, colorKey, vy: lvl.fall, kind });
  }

  function takeBottomStar(){
    let idx=-1, bestY=-1;
    for(let i=0;i<state.stars.length;i++){
      if(state.stars[i].y > bestY){ bestY = state.stars[i].y; idx = i; }
    }
    if(idx<0) return null;
    return { idx, star: state.stars[idx] };
  }

  function correct(){
    state.combo += 1;
    computeMult();
    const add = Math.floor((18 + Math.min(34, state.combo*2)) * state.mult);
    state.score += add;
    beep(520 + state.combo*10, 0.045, "sine", 0.05);
    if(state.combo % 10 === 0){ toast("🔥"); vibrate(10); }
  }

  function wrong(){
    state.combo = 0;
    computeMult();
    state.miss += 1;
    shake = 10;
    toast("❌");
    beep(160, 0.10, "sawtooth", 0.06);
    vibrate(14);
    if(state.miss >= 3){
      toast("结束");
      endGame();
    }
  }

  function bombClear(x,y){
    const n = state.stars.length;
    state.stars = [];
    state.score += Math.min(180, 20*n);
    makeParticles(x,y,"rgba(255,255,255,.95)",28,1.2);
    shake = 14;
    toast("💣");
    beep(120,0.16,"sawtooth",0.08);
    vibrate(18);
  }

  function hitDoor(doorIndex){
    if(!state.running || state.over) return;

    const got = takeBottomStar();
    if(!got) return;

    const { idx, star } = got;
    state.stars.splice(idx,1);

    const doorColor = doorOrder[doorIndex];

    if(star.kind === "g"){
      state.combo += 2;
      computeMult();
      state.score += Math.floor(140 * state.mult);
      makeParticles(star.x, star.y, "rgba(255,220,120,.95)", 24, 1.1);
      toast("⭐");
      beep(980,0.07,"triangle",0.07);
      vibrate(10);
      syncHUD();
      return;
    }

    if(star.kind === "b"){
      bombClear(star.x, star.y);
      syncHUD();
      return;
    }

    if(star.colorKey === doorColor){
      makeParticles(star.x, star.y, COLORS.find(c=>c.k===star.colorKey).c, 12, 0.9);
      correct();
    }else{
      wrong();
    }
    syncHUD();
  }

  function useFreeze(){
    if(state.freezeCharges<=0 || state.over) return;
    state.freezeCharges -= 1;
    state.freezeUntil = now() + 2400;
    toast("🧊");
    beep(520,0.07,"sine",0.07);
    vibrate(10);
    syncHUD();
  }

  function claimFreeze(){
    if(state.adCdUntil - now() > 0) return;
    $("ad").disabled = true;
    toast("🎁");
    setTimeout(()=>{
      state.freezeCharges += 1;
      const cd = (LEVELS[state.lvlIndex].id===1 ? 10 : 18);
      state.adCdUntil = now() + cd*1000;
      toast("🧊+1");
      beep(660,0.07,"triangle",0.07);
      syncHUD();
    }, 650);
  }

  function endGame(){
    state.over = true;
    state.running = false;
    syncHUD();
  }

  // ===== 绘制：不再重置 transform（关键修复）=====
  function drawStar(x,y,r,color,frozen,kind){
    ctx.save();
    ctx.translate(x,y);

    ctx.globalAlpha = frozen ? 0.18 : 0.20;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0,0,r*1.7,0,Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = frozen ? 0.78 : 0.96;
    ctx.beginPath();
    const spikes = 5;
    const outer = r;
    const inner = r*0.45;
    for(let i=0;i<spikes*2;i++){
      const ang = (Math.PI/spikes)*i - Math.PI/2;
      const rad = (i%2===0)?outer:inner;
      ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.strokeStyle = "rgba(255,255,255,.22)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = "900 14px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if(kind==="g") ctx.fillText("⭐", 0, 1);
    if(kind==="b") ctx.fillText("💣", 0, 1);

    ctx.restore();
  }

  function draw(){
    // 每帧都确保 DPR 坐标系（避免挤在左上角）
    ctx.setTransform(DPR,0,0,DPR,0,0);

    // 清屏用 CSS 像素范围（transform 已是 CSS 像素）
    ctx.clearRect(0, 0, view.W, view.H);

    // 震动（CSS像素）
    const sx = shake>0 ? rnd(-shake, shake) : 0;
    const sy = shake>0 ? rnd(-shake, shake) : 0;
    if(shake>0) shake *= 0.86;

    // 背景星尘
    ctx.globalAlpha = 0.12;
    for(let i=0;i<60;i++){
      const x = (i*127)%view.W;
      const y = (i*83)%view.H;
      ctx.beginPath();
      ctx.arc(x+sx,y+sy,(i%3)+1,0,Math.PI*2);
      ctx.fillStyle="#fff";
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 换位预警
    if(now() < state.swapTelegraphUntil){
      ctx.globalAlpha = 0.16;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,view.W,view.H);
      ctx.globalAlpha = 1;
      ctx.font = "900 20px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.9)";
      ctx.fillText("⚡", view.W-26, 26);
    }

    const frozen = now() < state.freezeUntil;

    // 星星
    for(const s of state.stars){
      let color = "#fff";
      if(s.kind==="n") color = COLORS.find(c=>c.k===s.colorKey).c;
      if(s.kind==="g") color = "#ffd166";
      if(s.kind==="b") color = "#d0d7ff";
      drawStar(s.x+sx, s.y+sy, s.r, color, frozen, s.kind);
    }

    // 粒子
    for(const p of particles){
      ctx.globalAlpha = clamp(p.life,0,1);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x+sx, p.y+sy, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    if(frozen){
      ctx.fillStyle = "rgba(120,200,255,.10)";
      ctx.fillRect(0,0,view.W,view.H);
    }

    // 结束遮罩
    if(state.over){
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(0,0,view.W,view.H);
      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.font = "900 34px system-ui";
      ctx.fillText("结束", view.W/2 - 34, view.H/2 - 6);
      ctx.font = "800 14px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.80)";
      ctx.fillText("点开始继续", view.W/2 - 34, view.H/2 + 20);
    }
  }

  // ===== 主循环 =====
  function tick(){
    const t = now();
    let slow = 1;
    if(state.running && !state.over && state.miss>=2 && state.stars.length>=6) slow = 0.58;
    const dt = Math.min(0.04, ((t - state.lastTick)/1000) * slow);
    state.lastTick = t;

    if(state.running && !state.over){
      state.timeLeft -= dt;

      const lvl = LEVELS[state.lvlIndex];

      if(t - state.lastSpawn > lvl.spawnEvery){
        state.lastSpawn = t;
        spawnStar();
      }

      // 换位（关2）
      if(lvl.swapChance>0 && Math.random() < lvl.swapChance*dt){
        state.swapTelegraphUntil = t + 180;
        setTimeout(()=>{ shuffleDoorOrder(); }, 180);
      }

      const frozen = t < state.freezeUntil;
      if(!frozen){
        for(const s of state.stars){
          s.y += s.vy * (60*dt);
        }
      }

      // 掉到底：漏掉算失误
      for(let i=state.stars.length-1;i>=0;i--){
        if(state.stars[i].y > view.H - 20){
          state.stars.splice(i,1);
          state.combo = 0; computeMult();
          state.miss += 1;
          shake = 8;
          beep(160,0.09,"sawtooth",0.05);
          vibrate(12);
          if(state.miss>=3){ toast("结束"); endGame(); }
          else toast("漏");
        }
      }

      if(state.timeLeft <= 0){
        state.timeLeft = 0;
        toast(lvl.id===1 ? "1-OK" : "通关");
        beep(880,0.12,"triangle",0.08);
        endGame();
      }

      syncHUD();
    }

    // 粒子更新
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= 0.02;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.98;
      if(p.life <= 0) particles.splice(i,1);
    }

    draw();
    requestAnimationFrame(tick);
  }

  // ===== 交互（pointerdown）=====
  function prevent(e){ e.preventDefault(); }

  $("d1").addEventListener("pointerdown", (e)=>{ prevent(e); hitDoor(0); }, {passive:false});
  $("d2").addEventListener("pointerdown", (e)=>{ prevent(e); hitDoor(1); }, {passive:false});
  $("d3").addEventListener("pointerdown", (e)=>{ prevent(e); hitDoor(2); }, {passive:false});

  // 点画布：自动选“底部星对应颜色的门”（更手机友好）
  cv.addEventListener("pointerdown", (e)=>{
    prevent(e);
    if(!state.running || state.over) return;
    const got = takeBottomStar();
    if(!got) return;
    const s = got.star;
    if(s.kind !== "n"){ hitDoor(1); return; }
    const idx = doorOrder.indexOf(s.colorKey);
    if(idx >= 0) hitDoor(idx);
  }, {passive:false});

  $("start").addEventListener("pointerdown", (e)=>{
    prevent(e);
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    if(!view.W || !view.H) resizeCanvas();
    resetGame();
    toast("开始");
    beep(520,0.07,"triangle",0.06);
  }, {passive:false});

  $("next").addEventListener("pointerdown", (e)=>{
    prevent(e);
    if(state.lvlIndex < LEVELS.length-1){
      state.lvlIndex += 1;
      resetGame();
      toast("第2关");
      beep(740,0.09,"triangle",0.07);
    }
  }, {passive:false});

  $("freeze").addEventListener("pointerdown", (e)=>{ prevent(e); useFreeze(); }, {passive:false});
  $("ad").addEventListener("pointerdown", (e)=>{ prevent(e); claimFreeze(); }, {passive:false});
  $("sound").addEventListener("pointerdown", (e)=>{
    prevent(e);
    soundOn = !soundOn;
    toast(soundOn ? "🔊" : "🔇");
    if(soundOn) beep(660,0.06,"sine",0.06);
    syncHUD();
  }, {passive:false});

  // ===== 初始化 =====
  function init(){
    resizeCanvas();
    window.addEventListener("resize", () => {
      resizeCanvas();
      // resize 后星星坐标仍在CSS像素系，无需额外缩放
    }, {passive:true});

    doorOrder = ["R","G","B"];
    renderDoorColors();

    // 初始不运行，显示结束遮罩
    state.running = false;
    state.over = true;
    state.freezeCharges = 1;
    state.lvlIndex = 0;
    state.timeLeft = LEVELS[0].duration;

    syncHUD();
    tick();
  }

  init();
})();
</script>
</body>
</html>
