<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>星星分拣员（移动端）</title>
  <style>
    :root{
      --bg:#0b1020; --panel:rgba(255,255,255,.06); --line:rgba(255,255,255,.12);
      --text:#e9edff; --muted:rgba(233,237,255,.72);
      --r:#ff5d73; --g:#57e389; --b:#63b3ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:radial-gradient(1000px 620px at 30% 0%, #1a2b70 0%, var(--bg) 62%);
      color:var(--text);
      overflow:hidden;
      touch-action:none; /* 防止页面滚动/缩放干扰 */
    }

    /* 竖屏手机优先容器 */
    .app{
      height:100%;
      display:flex;
      flex-direction:column;
      padding:
        calc(10px + env(safe-area-inset-top))
        10px
        calc(10px + env(safe-area-inset-bottom))
        10px;
      gap:10px;
      max-width:520px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .title{
      font-weight:900;
      letter-spacing:.2px;
      font-size:16px;
      line-height:1;
      white-space:nowrap;
    }
    .hud{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .pill{
      padding:6px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel);
      font-size:12px;
      color:var(--muted);
    }
    .pill b{color:var(--text)}

    .stage{
      flex:1;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius:16px;
      box-shadow:0 14px 40px rgba(0,0,0,.38);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    canvas{
      width:100%;
      flex:1;
      display:block;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    /* 底部拇指区：门 + 控件 */
    .bottom{
      border-top:1px solid rgba(255,255,255,.10);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background:rgba(0,0,0,.18);
      backdrop-filter: blur(6px);
    }

    .doors{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }
    .door{
      height:86px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 22px rgba(0,0,0,.30);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      letter-spacing:.3px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transform:translateZ(0);
    }
    .door:active{transform:scale(.98)}
    .door small{
      position:absolute;
      left:10px; top:10px;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.30);
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,255,255,.92);
      font-weight:800;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btn{
      height:44px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.07);
      color:var(--text);
      font-size:13px;
      font-weight:800;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:104px;
    }
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45}
    .btn.primary{background:linear-gradient(180deg, rgba(120,255,180,.22), rgba(255,255,255,.05)); border-color:rgba(120,255,180,.35)}
    .btn.warn{background:linear-gradient(180deg, rgba(255,220,120,.22), rgba(255,255,255,.05)); border-color:rgba(255,220,120,.35)}
    .btn.ghost{min-width:84px}

    .hint{
      font-size:12px;
      color:rgba(233,237,255,.60);
      line-height:1.35;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .toast{
      position:fixed;left:50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background:rgba(0,0,0,.72);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition:.16s opacity,.16s transform;
      z-index:999;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">⭐ 星星分拣员</div>
    <div class="hud">
      <span class="pill">关 <b id="lvl">1</b></span>
      <span class="pill">时 <b id="time">20</b>s</span>
      <span class="pill">分 <b id="score">0</b></span>
      <span class="pill">连 <b id="combo">0</b></span>
      <span class="pill">倍 <b id="mult">x1.0</b></span>
      <span class="pill">失 <b id="miss">0</b>/3</span>
      <span class="pill">🧊 <b id="fz">1</b></span>
    </div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>

    <div class="bottom">
      <div class="doors">
        <div class="door" id="d1" style="background:var(--r)"><small>1</small></div>
        <div class="door" id="d2" style="background:var(--g)"><small>2</small></div>
        <div class="door" id="d3" style="background:var(--b)"><small>3</small></div>
      </div>

      <div class="controls">
        <button class="btn primary" id="start">▶ 开始</button>
        <button class="btn warn" id="next">⏭ 下一关</button>
        <button class="btn" id="freeze">🧊 冷冻</button>
        <button class="btn" id="ad">🎁 领冷冻</button>
        <button class="btn ghost" id="sound">🔊</button>
      </div>

      <div class="hint">
        <span>规则：看颜色 → 点同色门</span>
        <span id="tip">第1关：轻松练手</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ====== 设备与画布：移动端高清不糊 ======
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d", { alpha: true });

  function resizeCanvas(){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const rect = cv.getBoundingClientRect();
    cv.width  = Math.floor(rect.width  * dpr);
    cv.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0); // 以CSS像素为单位绘制
  }
  window.addEventListener("resize", resizeCanvas, {passive:true});

  // ====== UI ======
  const $ = (id)=>document.getElementById(id);
  const toastEl = $("toast");
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 1000);
  }
  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
  function now(){ return Date.now(); }
  function rnd(a,b){ return a + Math.random()*(b-a); }

  // ====== 音效：WebAudio 极简（移动端会在第一次交互后解锁） ======
  let audioCtx = null;
  let soundOn = true;
  function beep(freq=440, dur=0.06, type="sine", vol=0.06){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + dur);
    }catch{}
  }

  // ====== 颜色与关卡（手机节奏：更短更爽） ======
  const COLORS = [
    {k:"R", c:"#ff5d73"},
    {k:"G", c:"#57e389"},
    {k:"B", c:"#63b3ff"},
  ];
  const LEVELS = [
    {id:1, duration:20, spawnEvery:780, fall:2.1, swapChance:0.00, specialRate:0.12, bombRate:0.03},
    {id:2, duration:20, spawnEvery:520, fall:3.4, swapChance:0.22, specialRate:0.18, bombRate:0.06},
  ];

  // ====== 粒子与震动 ======
  const particles = [];
  let shake = 0;

  function makeParticles(x,y,color,count=14, power=1){
    for(let i=0;i<count;i++){
      particles.push({x,y,vx:rnd(-3,3)*power, vy:rnd(-4,2)*power, life:rnd(0.28,0.55), r:rnd(2,4), color});
    }
  }
  function vibrate(ms=18){
    // 兼容：部分浏览器/系统可能禁用，失败无影响
    try{ if(navigator.vibrate) navigator.vibrate(ms); }catch{}
  }

  // ====== 游戏状态 ======
  const state = {
    lvlIndex:0,
    running:false,
    over:false,
    timeLeft:20,
    score:0,
    combo:0,
    mult:1.0,
    miss:0,
    stars:[], // {x,y,r,colorKey,vy,kind}
    lastSpawn:0,
    lastTick:0,
    freezeUntil:0,
    freezeCharges:1,
    adCdUntil:0,
    swapTelegraphUntil:0,
  };

  function computeMult(){
    const c = state.combo;
    const m = 1 + clamp(c/12, 0, 1.6); // 最高x2.6
    state.mult = Math.round(m*10)/10;
  }

  function syncHUD(){
    const lvl = LEVELS[state.lvlIndex];
    $("lvl").textContent = lvl.id;
    $("time").textContent = Math.max(0, Math.ceil(state.timeLeft));
    $("score").textContent = state.score;
    $("combo").textContent = state.combo;
    $("mult").textContent = "x" + state.mult.toFixed(1);
    $("miss").textContent = state.miss;
    $("fz").textContent = state.freezeCharges;

    $("next").disabled = !(state.over && lvl.id===1);
    $("freeze").disabled = state.freezeCharges<=0 || !state.running || state.over;

    const left = Math.max(0, Math.ceil((state.adCdUntil - now())/1000));
    $("ad").disabled = left>0 || !state.running || state.over;
    $("ad").textContent = left>0 ? `🎁 ${left}s` : "🎁 领冷冻";

    $("sound").textContent = soundOn ? "🔊" : "🔇";
    $("tip").textContent = (lvl.id===1) ? "第1关：轻松练手" : "第2关：加速+换位";
  }

  function setupDoors(){
    // 门颜色在UI上固定；关2会“换位”，我们通过交换映射实现（不需要移动DOM）
    doorOrder = ["R","G","B"]; // index 0..2 分别对应 d1 d2 d3
  }
  let doorOrder = ["R","G","B"];

  function renderDoorColors(){
    // 根据 doorOrder 重绘门的背景色（让换位对手机玩家更清晰）
    const map = {R:"#ff5d73", G:"#57e389", B:"#63b3ff"};
    $("d1").style.background = map[doorOrder[0]];
    $("d2").style.background = map[doorOrder[1]];
    $("d3").style.background = map[doorOrder[2]];
  }

  function shuffleDoorOrder(){
    // 轻微打乱三门映射（移动端更公平：先闪电提示）
    const a = [...doorOrder];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    doorOrder = a;
    renderDoorColors();
  }

  function resetGame(){
    const lvl = LEVELS[state.lvlIndex];
    state.running = true;
    state.over = false;
    state.timeLeft = lvl.duration;
    state.score = 0;
    state.combo = 0;
    state.mult = 1.0;
    state.miss = 0;
    state.stars = [];
    particles.length = 0;
    state.lastSpawn = 0;
    state.lastTick = now();
    state.freezeUntil = 0;
    state.swapTelegraphUntil = 0;
    // 第1关送一次冷冻
    state.freezeCharges = (lvl.id===1 ? Math.max(1, state.freezeCharges) : state.freezeCharges);
    setupDoors();
    renderDoorColors();
    syncHUD();
  }

  function spawnStar(){
    const lvl = LEVELS[state.lvlIndex];
    const r = 18;
    const width = cv.getBoundingClientRect().width;
    // 星星范围：避开底部门区（留出视觉清晰度）
    let x = 24 + Math.random()*(width-48);

    // 特殊星：金⭐爆分、💣清屏
    let kind = "n";
    const roll = Math.random();
    if(roll < lvl.bombRate) kind = "b";
    else if(roll < lvl.bombRate + lvl.specialRate) kind = "g";

    let colorKey = COLORS[Math.floor(Math.random()*COLORS.length)].k;
    if(kind !== "n") colorKey = "X";

    state.stars.push({ x, y:-22, r, colorKey, vy:lvl.fall, kind });
  }

  function takeBottomStar(){
    let idx=-1, bestY=-1;
    for(let i=0;i<state.stars.length;i++){
      if(state.stars[i].y > bestY){ bestY=state.stars[i].y; idx=i; }
    }
    if(idx<0) return null;
    return { idx, star: state.stars[idx] };
  }

  function correct(){
    state.combo += 1;
    computeMult();
    const add = Math.floor((18 + Math.min(34, state.combo*2)) * state.mult);
    state.score += add;
    beep(520 + state.combo*10, 0.045, "sine", 0.05);
    if(state.combo % 10 === 0){ toast("🔥"); vibrate(12); }
  }
  function wrong(){
    state.combo = 0;
    computeMult();
    state.miss += 1;
    shake = 10;
    toast("❌");
    beep(160, 0.10, "sawtooth", 0.06);
    vibrate(16);
    if(state.miss >= 3){
      toast("结束");
      endGame();
    }
  }

  function bombClear(x,y){
    const n = state.stars.length;
    state.stars = [];
    state.score += Math.min(180, 20*n);
    makeParticles(x,y,"rgba(255,255,255,.95)",28,1.2);
    shake = 14;
    toast("💣");
    beep(120,0.16,"sawtooth",0.08);
    vibrate(20);
  }

  function hitDoor(doorIndex){
    if(!state.running || state.over) return;

    const got = takeBottomStar();
    if(!got) return;

    const { idx, star } = got;
    state.stars.splice(idx,1);

    // 计算当前门对应的颜色（通过 doorOrder 映射）
    const doorColor = doorOrder[doorIndex];

    if(star.kind === "g"){
      // 金⭐：任意门都正确
      state.combo += 2;
      computeMult();
      state.score += Math.floor(140 * state.mult);
      makeParticles(star.x, star.y, "rgba(255,220,120,.95)", 24, 1.1);
      toast("⭐");
      beep(980,0.07,"triangle",0.07);
      vibrate(12);
      syncHUD();
      return;
    }
    if(star.kind === "b"){
      bombClear(star.x, star.y);
      syncHUD();
      return;
    }

    if(star.colorKey === doorColor){
      makeParticles(star.x, star.y, COLORS.find(c=>c.k===star.colorKey).c, 12, 0.9);
      correct();
    }else{
      wrong();
    }
    syncHUD();
  }

  function useFreeze(){
    if(state.freezeCharges<=0 || state.over) return;
    state.freezeCharges -= 1;
    state.freezeUntil = now() + 2400;
    toast("🧊");
    beep(520,0.07,"sine",0.07);
    vibrate(10);
    syncHUD();
  }

  function claimFreeze(){
    if(state.adCdUntil - now() > 0) return;
    $("ad").disabled = true;
    toast("🎁");
    setTimeout(()=>{
      state.freezeCharges += 1;
      const cd = (LEVELS[state.lvlIndex].id===1 ? 10 : 18);
      state.adCdUntil = now() + cd*1000;
      toast("🧊+1");
      beep(660,0.07,"triangle",0.07);
      syncHUD();
    }, 700);
  }

  function endGame(){
    state.over = true;
    state.running = false;
    syncHUD();
  }

  // ====== 绘制（手机：视觉为主，文字极少） ======
  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.arcTo(x+w,y,x+w,y+h,rr);
    ctx.arcTo(x+w,y+h,x,y+h,rr);
    ctx.arcTo(x,y+h,x,y,rr);
    ctx.arcTo(x,y,x+w,y,rr);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function drawStar(x,y,r,color,frozen,kind){
    ctx.save();
    ctx.translate(x,y);

    ctx.globalAlpha = frozen ? 0.18 : 0.20;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0,0,r*1.7,0,Math.PI*2);
    ctx.fill();

    ctx.globalAlpha = frozen ? 0.78 : 0.96;
    ctx.beginPath();
    const spikes = 5;
    const outer = r;
    const inner = r*0.45;
    for(let i=0;i<spikes*2;i++){
      const ang = (Math.PI/spikes)*i - Math.PI/2;
      const rad = (i%2===0)?outer:inner;
      ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.strokeStyle = "rgba(255,255,255,.22)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 特殊星图标（图形为主）
    ctx.font = "900 14px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if(kind==="g") ctx.fillText("⭐", 0, 1);
    if(kind==="b") ctx.fillText("💣", 0, 1);

    ctx.restore();
  }

  function draw(){
    const rect = cv.getBoundingClientRect();
    const W = rect.width;
    const H = rect.height;

    const sx = shake>0 ? rnd(-shake, shake) : 0;
    const sy = shake>0 ? rnd(-shake, shake) : 0;
    if(shake>0) shake *= 0.86;

    // 清屏
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,cv.width,cv.height);
    // 由于我们在 resizeCanvas 中把 transform 设到 dpr，这里用 CSS像素绘制：
    // draw时无需再次乘 dpr，因为 transform 已设好。

    // 背景星尘（轻量）
    ctx.globalAlpha = 0.12;
    for(let i=0;i<60;i++){
      const x = (i*127)%W;
      const y = (i*83)%H;
      ctx.beginPath();
      ctx.arc(x+sx,y+sy,(i%3)+1,0,Math.PI*2);
      ctx.fillStyle="#fff";
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 换位预警闪烁
    if(now() < state.swapTelegraphUntil){
      ctx.globalAlpha = 0.16;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha = 1;
      ctx.font = "900 20px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.9)";
      ctx.fillText("⚡", W-26, 26);
    }

    const frozen = now() < state.freezeUntil;

    // 星星
    for(const s of state.stars){
      let color = "#fff";
      if(s.kind==="n") color = COLORS.find(c=>c.k===s.colorKey).c;
      if(s.kind==="g") color = "#ffd166";
      if(s.kind==="b") color = "#d0d7ff";
      drawStar(s.x+sx, s.y+sy, s.r, color, frozen, s.kind);
    }

    // 粒子
    for(const p of particles){
      ctx.globalAlpha = clamp(p.life,0,1);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x+sx, p.y+sy, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // 冷冻遮罩
    if(frozen){
      ctx.fillStyle = "rgba(120,200,255,.10)";
      ctx.fillRect(0,0,W,H);
    }

    // 结束遮罩
    if(state.over){
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.font = "900 34px system-ui";
      ctx.fillText("结束", W/2 - 34, H/2 - 6);
      ctx.font = "800 14px system-ui";
      ctx.fillStyle = "rgba(255,255,255,.80)";
      ctx.fillText("点开始继续", W/2 - 34, H/2 + 20);
    }
  }

  // ====== 主循环（手机：稳定 60fps，濒死轻慢动作） ======
  function tick(){
    const t = now();
    let slow = 1;
    if(state.running && !state.over && state.miss>=2 && state.stars.length>=6) slow = 0.58;

    const dt = Math.min(0.04, ((t - state.lastTick)/1000) * slow);
    state.lastTick = t;

    if(state.running && !state.over){
      state.timeLeft -= dt;

      const lvl = LEVELS[state.lvlIndex];

      if(t - state.lastSpawn > lvl.spawnEvery){
        state.lastSpawn = t;
        spawnStar();
      }

      // 换位（关2）：先预警再换位
      if(lvl.swapChance>0 && Math.random() < lvl.swapChance*dt){
        state.swapTelegraphUntil = t + 180;
        setTimeout(()=>{ shuffleDoorOrder(); }, 180);
      }

      const frozen = t < state.freezeUntil;
      if(!frozen){
        for(const s of state.stars) s.y += s.vy * (60*dt);
      }

      // 掉到底：漏掉算失误
      const rect = cv.getBoundingClientRect();
      const H = rect.height;
      for(let i=state.stars.length-1;i>=0;i--){
        if(state.stars[i].y > H - 20){
          state.stars.splice(i,1);
          state.combo = 0; computeMult();
          state.miss += 1;
          shake = 8;
          beep(160,0.09,"sawtooth",0.05);
          vibrate(14);
          if(state.miss>=3){ toast("结束"); endGame(); }
          else toast("漏");
        }
      }

      if(state.timeLeft <= 0){
        state.timeLeft = 0;
        toast(lvl.id===1 ? "1-OK" : "通关");
        beep(880,0.12,"triangle",0.08);
        endGame();
      }

      syncHUD();
    }

    // 粒子更新
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= 0.02;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.vx *= 0.98;
      if(p.life <= 0) particles.splice(i,1);
    }

    draw();
    requestAnimationFrame(tick);
  }

  // ====== 交互：门按钮（手机拇指区） ======
  // 用 pointerdown，兼容鼠标/触摸/手写笔
  $("d1").addEventListener("pointerdown", (e)=>{ e.preventDefault(); hitDoor(0); }, {passive:false});
  $("d2").addEventListener("pointerdown", (e)=>{ e.preventDefault(); hitDoor(1); }, {passive:false});
  $("d3").addEventListener("pointerdown", (e)=>{ e.preventDefault(); hitDoor(2); }, {passive:false});

  // 额外：点击游戏区也能“点最近颜色门”（更懒人）
  // 逻辑：取底部星颜色，自动选择匹配门（降低挫败，提高爽感）
  cv.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    if(!state.running || state.over) return;
    const got = takeBottomStar();
    if(!got) return;
    const s = got.star;
    if(s.kind !== "n"){
      // 特殊星：随便按哪个门都行，默认中门
      hitDoor(1);
      return;
    }
    const idx = doorOrder.indexOf(s.colorKey);
    if(idx >= 0) hitDoor(idx);
  }, {passive:false});

  // 控件
  $("start").addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    // iOS 需要用户手势解锁音频
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    resetGame();
    toast("开始");
    beep(520,0.07,"triangle",0.06);
  }, {passive:false});

  $("next").addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    if(state.lvlIndex < LEVELS.length-1){
      state.lvlIndex += 1;
      resetGame();
      toast("第2关");
      beep(740,0.09,"triangle",0.07);
    }
  }, {passive:false});

  $("freeze").addEventListener("pointerdown", (e)=>{ e.preventDefault(); useFreeze(); }, {passive:false});
  $("ad").addEventListener("pointerdown", (e)=>{ e.preventDefault(); claimFreeze(); }, {passive:false});
  $("sound").addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    soundOn = !soundOn;
    toast(soundOn ? "🔊" : "🔇");
    if(soundOn) beep(660,0.06,"sine",0.06);
    syncHUD();
  }, {passive:false});

  // ====== 初始化 ======
  function init(){
    resizeCanvas();
    setupDoors();
    renderDoorColors();
    resetGame();
    // 初始不直接跑（让用户点开始更符合移动端）
    state.running = false;
    state.over = true;
    syncHUD();
    $("tip").textContent = "点开始开玩";
    tick();
  }
  init();
})();
</script>
</body>
</html>
